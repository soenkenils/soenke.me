name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build with Astro
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # The Pages backend occasionally rejects a deployment with a transient
      # "Deployment failed, try again later." — sometimes twice in a row
      # (2026-07-04), so retry twice with 60s waits before failing.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before first retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - name: Retry deploy to GitHub Pages
        id: retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before second retry
        if: steps.retry1.outcome == 'failure'
        run: sleep 60
      - name: Second retry deploy to GitHub Pages
        if: steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v5
      - name: Smoke check deployed site
        run: |
          sleep 10
          curl -sSf --retry 3 --retry-delay 10 https://soenke.me | grep -qi 'nommensen'